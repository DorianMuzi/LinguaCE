name: 🐛 Signaler un bug
description: Quelque chose ne fonctionne pas comme prévu
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug ! Renseigne les champs
        ci-dessous pour qu'on puisse le reproduire rapidement.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Décris clairement le problème.
      placeholder: Quand je fais X, il se passe Y…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le comportement.
      placeholder: |
        1. Aller sur '…'
        2. Cliquer sur '…'
        3. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: Je m'attendais à…
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Plateforme
      options:
        - Android
        - iOS
        - Web
        - Desktop (Windows/macOS/Linux)
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Thème
      options:
        - Clair
        - Sombre
        - Les deux
        - Sans rapport
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Captures d'écran / contexte
      description: Ajoute des captures, logs ou tout détail utile (sans clé ni secret !).
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications
      options:
        - label: J'ai cherché dans les issues existantes et ce bug n'est pas déjà signalé
          required: true
        - label: Je n'ai inclus aucune clé API ni secret
          required: true
