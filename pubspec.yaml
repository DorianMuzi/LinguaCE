name: lingua_ce
description: "Application mobile d'apprentissage de la langue tchétchène avec IA."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.1
  supabase_flutter: ^2.3.4
  flutter_markdown: ^0.7.4
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/IconeApp.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B1B2E"
  adaptive_icon_foreground: "assets/images/IconeApp.png"
  remove_alpha_ios: true
  background_color_ios: "#1B1B2E"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
